repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: python -m ruff check .
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        always_run: true
