name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Provide a safe default for the test run — the conftest.py also sets
      # this via os.environ.setdefault, but setting it here ensures the value
      # is available before any Python module is imported by the test runner.
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
      JWT_SECRET: "ci-secret-key-at-least-32-bytes-long!"
      ENV: "test"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest -q
